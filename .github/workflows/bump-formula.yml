name: Bump Homebrew formula

# Runs after a version tag is pushed (same trigger as publish.yml).
# Waits for the sdist to appear on PyPI, then updates the sha256 and version
# in the homebrew-tap repo so `brew upgrade` picks up the new release.
#
# Required secret: HOMEBREW_TAP_TOKEN
#   A GitHub Personal Access Token with `repo` scope on the
#   abhinaykrupa/homebrew-tap repo. Add it in:
#   Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump to (e.g. 0.5.1)"
        required: true

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # strip leading 'v' from tag name
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for PyPI sdist (up to 5 min)
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://pypi.org/pypi/cowork-to-code-bridge/$VERSION/json")
            if [[ "$STATUS" == "200" ]]; then
              echo "PyPI release $VERSION is live."
              exit 0
            fi
            echo "Waiting for PyPI... attempt $i/30"
            sleep 10
          done
          echo "Timed out waiting for PyPI release $VERSION" >&2
          exit 1

      - name: Fetch sdist sha256 from PyPI
        id: sha
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA256=$(curl -s "https://pypi.org/pypi/cowork-to-code-bridge/$VERSION/json" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for f in data['urls']:
              if f['packagetype'] == 'sdist':
                  print(f['digests']['sha256'])
                  break
          ")
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Resolved sha256: $SHA256"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: abhinaykrupa/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          FORMULA="homebrew-tap/Formula/cowork-to-code-bridge.rb"

          # Update url line
          sed -i "s|url \"https://files.pythonhosted.org/.*\"|url \"https://files.pythonhosted.org/packages/source/c/cowork-to-code-bridge/cowork_to_code_bridge-${VERSION}.tar.gz\"|" "$FORMULA"

          # Update sha256 line
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"

          echo "Updated formula to v${VERSION} (sha256: ${SHA256})"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cowork-to-code-bridge.rb
          git diff --cached --quiet && { echo "No changes to commit."; exit 0; }
          git commit -m "chore: bump cowork-to-code-bridge to v${VERSION}"
          git push
