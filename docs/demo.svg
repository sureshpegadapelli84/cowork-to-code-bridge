<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <rect width="720" height="400" rx="10" fill="#0d1117"/>
  <rect width="720" height="32" rx="10" fill="#161b22"/>
  <rect y="22" width="720" height="10" fill="#161b22"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="16" r="6" fill="#27c93f"/>
  <text x="360" y="21" fill="#8b949e" text-anchor="middle" font-size="12">Claude Cowork  ·  cowork-to-code-bridge</text>

  <text x="20" y="68" fill="#8b949e">you ▸ <tspan fill="#58a6ff">build me a Flask app on my machine, install it, run it, confirm it responds</tspan></text>

  <text x="20" y="104" fill="#d2a8ff">claude ▸ <tspan fill="#c9d1d9">Handing this to Claude Code on your machine via the bridge…</tspan></text>

  <text x="20" y="140" fill="#8b949e">  → created app.py + requirements.txt</text>
  <text x="20" y="164" fill="#8b949e">  → python -m venv .venv  ·  pip install flask</text>
  <text x="20" y="188" fill="#8b949e">  → flask run :5099  (PID 33093)</text>
  <text x="20" y="212" fill="#8b949e">  → curl http://127.0.0.1:5099/  →  <tspan fill="#3fb950">{"status":"ok"} 200</tspan></text>
  <text x="20" y="236" fill="#8b949e">  → stopped server, cleaned up</text>

  <text x="20" y="272" fill="#3fb950">claude ▸ Done.<tspan fill="#c9d1d9"> Built and verified a working Flask app on your machine.</tspan></text>

  <text x="20" y="316" fill="#21262d">────────────────────────────────────────────────────────────</text>
  <text x="20" y="340" fill="#8b949e">one command to install · runs on macOS &amp; Linux · idempotent · no open ports</text>
  <text x="20" y="368" fill="#d2a8ff">$ curl -fsSL .../install.sh | bash<tspan fill="#8b949e">   then just talk to Claude</tspan></text>
</svg>
