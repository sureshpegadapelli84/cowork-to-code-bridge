name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # The bridge runs on macOS (launchd) and Linux (systemd); test on both.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Shell syntax check
        run: |
          bash -n install.sh
          bash -n daemon/uninstall.sh
          for s in examples/allowed_scripts/*.sh; do bash -n "$s"; done

      - name: Tests
        run: pytest -q
